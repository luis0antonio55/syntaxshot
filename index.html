<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="google-site-verification" content="Bli7YE0Zg-GKHJfAKd_iOtWBrG8jOCcGmmilzhBFUlk" />

  <!-- Favicons -->
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="48x48" href="/favicon/favicon-48x48.png" />
  <link rel="icon" type="image/png" sizes="96x96" href="/favicon/favicon-96x96.png" />
  <link rel="apple-touch-icon" href="/favicon/apple-touch-icon.png" />
  <link rel="manifest" href="/favicon/site.webmanifest" />
  <meta name="theme-color" content="#00e676" />

  <!--
    title, description, canonical, og:title, og:description, og:url,
    twitter:title and twitter:description are injected per-route at build
    time by vite-prerender-plugin (src/prerender.tsx).
    Do NOT add them here — duplicates confuse crawlers.
  -->
  <meta name="robots" content="index, follow" />

  <!-- Shared OG / Twitter tags (same on every page) -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="SyntaxShot" />
  <meta property="og:image" content="https://syntaxshot.dev/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://syntaxshot.dev/og-image.png" />

  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "SyntaxShot",
      "applicationCategory": "DeveloperApplication",
      "operatingSystem": "Windows, macOS, Linux",
      "description": "Node.js CLI tool that generates syntax-highlighted code screenshots.",
      "url": "https://syntaxshot.dev",
      "offers": [
        { "@type": "Offer", "name": "Free", "price": "0", "priceCurrency": "USD" },
        { "@type": "Offer", "name": "Pro", "price": "5", "priceCurrency": "USD" }
      ]
    }
  </script>

  <!--
    Google Fonts — non-blocking.
    1. preconnect opens the socket early (no blocking).
    2. The <link rel="preload"> fetches the CSS as a high-priority
       but non-render-blocking resource.
    3. The onload swap makes it a real stylesheet once downloaded.
    4. display=optional (instead of swap) prevents Cumulative Layout Shift:
       if the web font is not ready within the browser's short block period,
       the system fallback is kept and never swapped, so text never reflows.
       Trade-off: on a cold (uncached) first visit the branded fonts may not
       appear until a later navigation. Change back to display=swap if the
       brand typography on first paint matters more than CLS.
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="preload"
    as="style"
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=optional"
    onload="this.onload=null;this.rel='stylesheet'"
  />

  <!-- Critical above-the-fold styles only -->
  <style>
    html, body { height: 100%; margin: 0; }
    #root { height: 100%; }
    /* Prevent invisible text while fonts load (display=swap handles this
       for Google Fonts, but define fallbacks so layout shift is minimal) */
    body { font-family: system-ui, sans-serif; background: #080808; color: #f0f0f0; }
  </style>
</head>

<body>
  <!-- GTM noscript — keep as first child of body -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-KTMQPCPC" height="0" width="0"
      style="display:none;visibility:hidden"></iframe></noscript>

  <div id="root"></div>

  <script type="module" prerender src="/src/prerender.tsx"></script>
  <script type="module" src="/src/main.tsx"></script>

  <!--
    Google Tag Manager — deferred until after the page is interactive.
    Loaded with requestIdleCallback (rIC) so it never blocks LCP.
    Falls back to a 3 s setTimeout in browsers that don't support rIC.
  -->
  <script>
    (function () {
      function loadGTM() {
        var w = window, d = document, s = 'script', l = 'dataLayer', i = 'GTM-KTMQPCPC';
        w[l] = w[l] || [];
        w[l].push({ 'gtm.start': new Date().getTime(), event: 'gtm.js' });
        var f = d.getElementsByTagName(s)[0],
            j = d.createElement(s);
        j.async = true;
        j.src = 'https://www.googletagmanager.com/gtm.js?id=' + i;
        f.parentNode.insertBefore(j, f);
      }
      if ('requestIdleCallback' in window) {
        requestIdleCallback(loadGTM, { timeout: 3000 });
      } else {
        setTimeout(loadGTM, 3000);
      }
    })();
  </script>
</body>

</html>
